name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-preview*'   # v1.0.0-preview1

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/EasySQL/EasySQL.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/EasySQL/EasySQL.csproj -c Release --no-build -o ./nupkgs

      - name: List package
        run: ls -la ./nupkgs/

      - name: Check .NET version
        run: dotnet --version

      - name: Publish to NuGet
        run: |
          echo "获取 OIDC token..."
          OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json; api-version=2.0" | jq -r '.value')
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "❌ 获取 token 失败，尝试无 audience..."
            OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}" \
              -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              -H "Accept: application/json; api-version=2.0" | jq -r '.value')
          fi
          echo "Token 长度: ${#OIDC_TOKEN}"
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key "$OIDC_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
