name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-preview*'   # v1.0.0-preview1

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/EasySQL/EasySQL.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/EasySQL/EasySQL.csproj -c Release --no-build -o ./nupkgs

      - name: List package
        run: ls -la ./nupkgs/

      - name: Publish to NuGet
        run: |
          echo "正在获取 OIDC token..."
          response=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://api.nuget.org" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json; api-version=2.0")
          oidc_token=$(echo "$response" | jq -r '.value')
          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "❌ 获取 OIDC token 失败: $response"
            exit 1
          fi
          echo "✅ OIDC token 获取成功，正在推送..."
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key "$oidc_token" \
            --source https://api.nuget.org/v3/index.json
