name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-preview*'   # v1.0.0-preview1

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/EasySQL/EasySQL.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/EasySQL/EasySQL.csproj -c Release --no-build -o ./nupkgs

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json
